<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parallax Background - Prototype</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
        }


        body {
            background: black;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translate(-50%);
            width: 780px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        #score {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
        }

        #controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        button {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid white;
            border-radius: 10px;
            font-size: 20px;
            padding: 5px 10px;
            cursor: pointer;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #pauseMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            display: none;
            /* hidden by default */

            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .menu-box {
            background: #222;
            padding: 30px;
            border: 3px solid white;
            border-radius: 10px;
            text-align: center;
        }

        .menu-box button {
            display: block;
            width: 200px;
            margin: 10px auto;
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .exit {
            background: red;
            color: white;
        }
    </style>
</head>

<body>
    <canvas id="canvas-bg"></canvas>

    <div id="ui">
        <div id="hearts">
            <canvas id="heartCanvas" width="150" height="50"></canvas>
        </div>
    </div>

    <div class="pauseMenu">
        <div class="menu-box">
            <button id="resumeBtn">Resume</button>
            <button id="mainMenuBtn">Main Menu</button>
            <button id="exitBtn">✖</button>
        </div>
    </div>

    <!-- SCRIPT FOR BACKGROUND -->
    <script>
        const canvas = document.getElementById("canvas-bg");
        const ctx = canvas.getContext("2d");
        const CANVAS_WIDTH = canvas.width = window.innerWidth;
        const CANVAS_HEIGHT = canvas.height = window.innerHeight;
        let gameSpeed = 2;

        // Background 1
        const background1 = new Image();
        background1.src = "/Sprites/background.png";

        // Obstacle image
        const obstacleImg = new Image();
        obstacleImg.src = "/Sprites/obstacle-Photoroom.png";

        let x = 0;
        let x2 = CANVAS_WIDTH;

        let musicStarted = false;
        let musicMuted = false;
        let music;

        window.addEventListener("load", () => {
            if (!musicStarted) {
                music = new Audio('/Audio/audio1.mp3');
                music.loop = true;
                music.volume = 0.5;
                music.play().catch(() => {
                    console.log("Autoplay blocked by browser.")
                });
                musicStarted = true;
            }
        });

        canvas.addEventListener("click", (e) => {
            if (hoveredButton === "mute" && music) {
                musicMuted = !musicMuted;
                music.volume = musicMuted ? 0 : 0.5;
            }
        });

        canvas.addEventListener("click", (e) => {
            if (hoveredButton === "pause"){
                togglePauseBtn();
            }
        });

        // Create the parallax animation
        function animate() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            hoveredButton = null;

            if (background1.complete) {
                ctx.drawImage(background1, x, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                ctx.drawImage(background1, x2, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            }

            if (x <= -CANVAS_WIDTH) x = x2 + CANVAS_WIDTH;
            if (x2 <= -CANVAS_WIDTH) x2 = x + CANVAS_WIDTH;

            x -= gameSpeed;
            x2 -= gameSpeed;
            requestAnimationFrame(animate);

            drawUI(ctx);

            drawBorder();
        }
        animate();
    </script>

    <!-- SCRIPTING FOR GAME UI -->
    <script>
        let mouse = {
            x: 0,
            y: 0,
        };

        let hoveredButton = null;

        // Track mouse position
        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        let heartScale = 1;
        let heartPulseDir = 1;
        // Simulate damage animation trigger (design only)
        let heartFlash = false;
        let flashTimer = 0;

        function drawUI(ctx) {
            /* ===================== ❤️ HEARTS ===================== */
            const mangoImg = new Image();
            mangoImg.src = '/Sprites/mango.png';

            function drawMango(x, y, size, scale) {
                if (!mangoImg.complete) return;

                ctx.save();
                ctx.translate(x, y);
                ctx.scale(scale, scale);

                if (heartFlash) {
                    ctx.globalAlpha = 0.5;
                }

                ctx.drawImage(
                    mangoImg,
                    -size / 2,
                    -size / 2,
                    size,
                    size
                );
                ctx.restore();
            }

            heartScale += 0.005 * heartPulseDir;
            if (heartScale > 1.15 || heartScale < 0.9) heartPulseDir *= -1;

            if (heartFlash) {
                flashTime++;
                if (flashTime > 12) {
                    heartFlash = false;
                    flashTimer = 0;
                }
            }

            drawMango(370, 130, 60, heartScale);
            drawMango(400, 130, 60, heartScale);
            drawMango(430, 130, 60, heartScale);


            /* ===================== TIMER ===================== */
            function drawTimer() {
                if (!drawTimer.startTime) {
                    drawTimer.startTime = Date.now();
                }

                let elapsedTime = Date.now() - drawTimer.startTime;

                let totalSeconds = Math.floor(elapsedTime / 1000);

                let minutes = Math.floor(totalSeconds / 60);
                let seconds = totalSeconds % 60;

                minutes = minutes.toString().padStart(2, '0');
                seconds = seconds.toString().padStart(2, '0');

                const timerText = `Time: ${minutes}: ${seconds}`;

                ctx.font = "bold 50px Comic Sans MS";
                ctx.textAlign = "center";
                ctx.lineWidth = 4;
                ctx.strokeStyle = "black";
                ctx.fillStyle = "#ffcc00";

                const marginTop = 100;
                const yPosition = 50 + marginTop;

                ctx.strokeText(timerText, CANVAS_WIDTH / 2, yPosition);
                ctx.fillText(timerText, CANVAS_WIDTH / 2, yPosition);
            }
            drawTimer();




            /* ===================== BUTTONS ===================== */
            function drawPauseBtn(x, y, size) {
                const isHover =
                    mouse.x >= x &&
                    mouse.x <= x + size &&
                    mouse.y >= y &&
                    mouse.y <= y + size;

                if (isHover) hoveredButton = "pause";

                //Background

                let btnGradient = ctx.createLinearGradient(x, y, x + size, y + size);
                btnGradient.addColorStop(0, isHover ? "#1abc9c" : "#16a085");
                btnGradient.addColorStop(1, isHover ? "#f1c40f" : "#f39c12");

                ctx.fillStyle = btnGradient;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowBlur = 8;
                ctx.fillRoundRect(x, y, size, size, 10);

                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.strokeRoundRect(x, y, size, size, 10);

                // Icon
                ctx.fillStyle = "#fff";
                ctx.shadowBlur = 0;

                ctx.fillRect(x + size * 0.3, y + size * 0.2, size * 0.15, size * 0.6);
                ctx.fillRect(x + size * 0.55, y + size * 0.2, size * 0.15, size * 0.6);
            }

            function drawMuteBtn(x, y, size) {
                const isHover =
                    mouse.x >= x &&
                    mouse.x <= x + size &&
                    mouse.y >= y &&
                    mouse.y <= y + size;

                if (isHover) hoveredButton = "mute";

                // Background
                let btnGradient = ctx.createLinearGradient(x, y, x + size, y + size);
                btnGradient.addColorStop(0, isHover ? "#1abc9c" : "#16a085");
                btnGradient.addColorStop(1, isHover ? "#f1c40f" : "#f39c12");

                ctx.fillStyle = btnGradient;
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowBlur = 8;
                ctx.fillRoundRect(x, y, size, size, 10);

                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.strokeRoundRect(x, y, size, size, 10);

                ctx.fillStyle = "#fff";
                ctx.shadowBlur = 0;

                /* ===== SPEAKER ===== */
                ctx.beginPath();
                ctx.moveTo(x + size * 0.2, y + size * 0.4);
                ctx.lineTo(x + size * 0.4, y + size * 0.4);
                ctx.lineTo(x + size * 0.65, y + size * 0.2);
                ctx.lineTo(x + size * 0.65, y + size * 0.8);
                ctx.lineTo(x + size * 0.4, y + size * 0.6);
                ctx.lineTo(x + size * 0.2, y + size * 0.6);
                ctx.closePath();
                ctx.fill();

                if (!musicMuted) {
                    /* ===== SOUND ON ===== */
                    ctx.strokeStyle = "#00ffcc";

                    ctx.beginPath();
                    ctx.arc(x + size * 0.7, y + size * 0.5, size * 0.12, -0.6, 0.6);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(x + size * 0.75, y + size * 0.5, size * 0.2, -0.6, 0.6);
                    ctx.stroke();

                } else {
                    /* ===== MUTED ===== */
                    ctx.strokeStyle = "#ff4d4d";
                    ctx.lineWidth = 4;

                    ctx.beginPath();
                    ctx.moveTo(x + size * 0.7, y + size * 0.3);
                    ctx.lineTo(x + size * 0.95, y + size * 0.7);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(x + size * 0.95, y + size * 0.3);
                    ctx.lineTo(x + size * 0.7, y + size * 0.7);
                    ctx.stroke();
                }
            }

            const btnSize = 45;
            drawPauseBtn(CANVAS_WIDTH - 350, 110, btnSize);
            drawMuteBtn(CANVAS_WIDTH - 270, 110, btnSize);

            let isPaused = false;

            function togglePauseBtn() {
                isPaused = !isPaused;
                drawPauseOverlay();
            }
            function drawPauseOverlay() {
                if (!isPaused) return;

                ctx.save();
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // Red square indicator (center)
                const size = 80;
                const x = CANVAS_WIDTH / 2 - size / 2;
                const y = CANVAS_HEIGHT / 2 - size / 2;

                ctx.fillStyle = "#ff3b3b";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 10;
                ctx.fillRect(x, y, size, size);

                ctx.restore();
            }
        }

        CanvasRenderingContext2D.prototype.fillRoundRect = function (x, y, w, h, r) {
            this.beginPath();
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            this.fill();
        };

        CanvasRenderingContext2D.prototype.strokeRoundRect = function (x, y, w, h, r) {
            this.beginPath();
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            this.stroke();
        };
    </script>

    <!-- SCRIPTING FOR BORDER -->
    <script>
        const borderImg = new Image();
        borderImg.src = "/Sprites/border.png";

        function drawBorder() {
            const overflow = 20;

            ctx.drawImage(
                borderImg,
                -overflow,
                -overflow,
                CANVAS_WIDTH + overflow * 2,
                CANVAS_HEIGHT + overflow * 2,
            );
        }
    </script>
</body>

</html>
